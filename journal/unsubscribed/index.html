<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unsubscribed — Pointegrity</title>
  <meta name="robots" content="noindex">

  <link rel="icon" href="/static/logo/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/motif/tokens.css">
  <link rel="stylesheet" href="/static/brand.css">
  <link rel="stylesheet" href="/static/site.css">

  <style>
    body { padding: 0; }
    .wrap { max-width: 38rem; margin: 0 auto; padding: 4rem 1rem; }
    h1 { color: var(--color-fg); margin: 0 0 1rem; }
    p { line-height: 1.7; color: var(--color-fg); }
    .muted { color: var(--color-fg-muted); font-size: 0.95rem; }
    .actions { margin-top: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; }
    .actions a {
      padding: 0.5rem 1.1rem;
      background: transparent;
      color: var(--color-primary-700);
      border: 1px solid var(--color-primary-700);
      border-radius: 4px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Unsubscribed.</h1>

    <p>Your address is removed from the list. No hard feelings — and we
    don't send a "we're sorry to see you go" follow-up. That's the kind of
    thing we're trying not to do.</p>

    <p class="muted">RSS at <a href="/journal/feed.xml">/journal/feed.xml</a>
    is always available if you'd like to keep up without email.</p>

    <div class="actions">
      <a href="/journal/">Back to the journal</a>
    </div>
  </div>
</body>
</html>
