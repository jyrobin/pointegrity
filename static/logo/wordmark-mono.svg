<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pointegrity wordmark — monochrome (ink only).
  For contexts where color can't be relied on: print, faxed invoices,
  PDF watermarks, single-color embroidery, etc. The regular 'i' with
  its default dot is used; no accent color.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 140"
     role="img" aria-label="Pointegrity">
  <defs>
    <style><![CDATA[
      .word {
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
        font-weight: 700;
        font-size: 88px;
        letter-spacing: -0.02em;
        fill: #1e2f14;
      }
    ]]></style>
  </defs>
  <text x="20" y="100" class="word">Pointegrity</text>
</svg>
