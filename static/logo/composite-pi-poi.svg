<?xml version="1.0" encoding="UTF-8"?>
<!--
  Family-mark composite: Pi · POI.
  POI = Project Orientation & Intelligence.

  Note the double-meaning: the "pi" prefix already contains "POI"
  (P-O-I initials), so "pi · poi" reads as both "Pointegrity's POI"
  and as a recursive nod to the tool's own framing.

  Typography: see composite-pi-pouch.svg for the typography
  decisions (Plex Sans 700, not 800 — prevents synthetic-bold).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 140"
     role="img" aria-label="Pi · POI">
  <defs>
    <style><![CDATA[
      .pi {
        font-family: 'IBM Plex Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
        font-weight: 700;
        font-size: 88px;
        letter-spacing: -0.04em;
        fill: #1e2f14;
      }
      .sep {
        font-family: 'IBM Plex Sans', system-ui, sans-serif;
        font-weight: 400;
        font-size: 64px;
        fill: #9ca3af;
      }
      .product {
        font-family: 'IBM Plex Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
        font-weight: 600;
        font-size: 72px;
        letter-spacing: 0.02em;
        fill: #2d441d;
      }
    ]]></style>
  </defs>
  <text x="20" y="100" class="pi">pı</text>
  <circle cx="86" cy="40" r="9" fill="#dc2626"/>
  <text x="115" y="92" class="sep">·</text>
  <text x="140" y="100" class="product">POI</text>
</svg>
