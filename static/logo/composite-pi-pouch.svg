<?xml version="1.0" encoding="UTF-8"?>
<!--
  Family-mark composite: Pi · Pouch.
  Pattern for sub-product branding. The "pi" mark on the left
  identifies the Pointegrity family; the middot separator + product
  name on the right identifies the specific product.

  Use anywhere you'd want "by Pointegrity" context, e.g. a demo
  header, a sales deck, or marketing copy where a product's parent
  company matters.

  To use for another product: swap "pouch" for the product name and
  adjust the total width if needed.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140"
     role="img" aria-label="Pi · Pouch">
  <defs>
    <style><![CDATA[
      .pi {
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
        font-weight: 800;
        font-size: 88px;
        letter-spacing: -0.04em;
        fill: #1e2f14;
      }
      .sep {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 400;
        font-size: 64px;
        fill: #9ca3af;
      }
      .product {
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
        font-weight: 600;
        font-size: 72px;
        letter-spacing: -0.02em;
        fill: #2d441d;
      }
    ]]></style>
  </defs>
  <text x="20" y="100" class="pi">pı</text>
  <circle cx="102" cy="45" r="9" fill="#dc2626"/>
  <text x="155" y="92" class="sep">·</text>
  <text x="195" y="100" class="product">pouch</text>
</svg>
