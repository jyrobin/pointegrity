<?xml version="1.0" encoding="UTF-8"?>
<!--
  Family-mark composite: Pi · Pouch.
  Pattern for sub-product branding. The "pi" mark on the left
  identifies the Pointegrity family; the middot separator + product
  name on the right identifies the specific product.

  Typography: IBM Plex Sans (matches the brand typeface set by
  brand.css). Weight 700 is Plex's heaviest; do not use 800 (browsers
  synthesize a thicker faux-bold when that weight isn't available,
  which renders inconsistently across Chrome/Safari/Firefox).

  Still text-based (not font-locked). Renders correctly wherever
  Plex is loaded (any page linking brand.css). For external embeds
  in contexts that don't load Plex, use PNG renders or extend
  _extract.py to emit path-based composites.

  To reuse for another product: swap "pouch" for the product name
  and adjust x-position + viewBox width if the new name is longer.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 140"
     role="img" aria-label="Pi · Pouch">
  <defs>
    <style><![CDATA[
      .pi {
        font-family: 'IBM Plex Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
        font-weight: 700;
        font-size: 88px;
        /* No letter-spacing: mark-pi.svg's paths are extracted at natural
           advances, so the composite must also use natural tracking for
           the two "pı" renderings to be visually identical. */
        fill: #1e2f14;
      }
      .sep {
        font-family: 'IBM Plex Sans', system-ui, sans-serif;
        font-weight: 400;
        font-size: 64px;
        fill: #9ca3af;
      }
      .product {
        font-family: 'IBM Plex Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
        font-weight: 600;
        font-size: 80px;
        letter-spacing: -0.02em;
        fill: #2d441d;
      }
    ]]></style>
  </defs>
  <text x="20" y="100" class="pi">pı</text>
  <circle cx="84" cy="40" r="9" fill="#dc2626"/>
  <text x="108" y="93" class="sep">·</text>
  <text x="135" y="100" class="product">pouch</text>
</svg>
