<!doctype html>
<!--
  Render helper — rasterizes the font-locked mark-pi.svg to PNG at a
  given size via headless Chrome. No font loading needed since the
  SVG now contains extracted glyph paths, not <text> elements.

  Usage:  open ?size=<px>  — page becomes exactly <size> × <size>
  Screenshot at viewport = size × size produces a clean PNG.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>pi mark render</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      background: transparent;
      overflow: hidden;
    }
    #frame { background: transparent; }
    img { display: block; width: 100%; height: 100%; }
    #frame { width: 512px; height: 512px; }
  </style>
</head>
<body>
  <div id="frame">
    <img src="mark-pi.svg" alt="">
  </div>
  <script>
    const size = parseInt(
      new URLSearchParams(location.search).get('size') || '512', 10);
    const frame = document.getElementById('frame');
    frame.style.width = size + 'px';
    frame.style.height = size + 'px';
    // No fonts.ready wait needed — SVG has no text.
    document.body.setAttribute('data-ready', '1');
  </script>
</body>
</html>
