<?xml version="1.0" encoding="UTF-8"?>
<!--
  Favicon — SVG master. Same composition as mark-pi.svg; identical
  glyph coords and accent-dot position so the favicon reads as the
  same mark the rest of the brand uses.

  Font stack starts with Inter then falls back to system-ui. On
  systems without Inter the browser uses SF Pro (macOS) or Segoe UI
  (Windows). Accent-dot cx/cy values were tuned against the
  system-fallback rendering, so the live SVG and our PNG rasters
  (rendered with the same stack, no external Inter load) align.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160"
     role="img" aria-label="π — Pointegrity">
  <style>
    .mark {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-weight: 800;
      font-size: 128px;
      letter-spacing: -0.04em;
      fill: #1e2f14;
    }
  </style>
  <text x="28" y="120" class="mark">pı</text>
  <circle cx="117" cy="33" r="13" fill="#dc2626"/>
</svg>
